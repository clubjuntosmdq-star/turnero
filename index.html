<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Club Juntos - Sistema con BD en Nube</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f8f9fa; color: #1a1a1a; }
    input, select, textarea { font-family: 'Inter', sans-serif; }
  </style>
</helmet>

<sc-if value="{{ !usuarioAutenticado }}" hint-placeholder-val="{{ false }}">
  <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #ec4899 0%, #06b6d4 100%);">
    <div style="background: white; padding: 40px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); width: 100%; max-width: 400px;">
      <div style="text-align: center; margin-bottom: 32px;">
        <div style="font-size: 48px; margin-bottom: 16px;">🏃</div>
        <h1 style="font-size: 24px; font-weight: 700; margin-bottom: 8px;">Club Juntos</h1>
        <p style="color: #666; font-size: 14px;">Sistema con Base de Datos en Nube</p>
      </div>
      <div style="margin-bottom: 24px;">
        <input type="text" id="loginUser" placeholder="Usuario" style="width: 100%; padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; box-sizing: border-box; margin-bottom: 12px;" />
        <input type="password" id="loginPass" placeholder="Contraseña" style="width: 100%; padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; box-sizing: border-box;" />
      </div>
      <button onClick="{{ handleLogin }}" style="width: 100%; background: linear-gradient(135deg, #ec4899 0%, #06b6d4 100%); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-bottom: 16px;">Ingresar</button>
      <div style="background: #f3f4f6; padding: 12px; border-radius: 8px; font-size: 11px; color: #666; line-height: 1.6;">
        <strong>Demo:</strong><br/>admin/12345 | juan/12345<br/><br/>
        ⚠️ Necesitas Supabase para persistencia
      </div>
    </div>
  </div>
</sc-if>

<sc-if value="{{ usuarioAutenticado }}" hint-placeholder-val="{{ true }}">
  <div style="display: flex; min-height: 100vh;">
    <nav style="width: 280px; background: linear-gradient(135deg, #ec4899 0%, #06b6d4 100%); color: white; padding: 24px; position: fixed; height: 100vh; overflow-y: auto; z-index: 1000; display: flex; flex-direction: column; gap: 24px;">
      <div style="display: flex; align-items: center; gap: 12px;">
        <div style="width: 40px; height: 40px; background: rgba(255,255,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px;">🏃</div>
        <div>
          <div style="font-weight: 700; font-size: 16px; color: #1a1a1a;">Club Juntos</div>
          <div style="font-size: 11px; opacity: 0.7; color: #1a1a1a;">{{ usuarioNombre }}</div>
        </div>
      </div>
      <div style="display: flex; flex-direction: column; gap: 8px; flex: 1;">
        <sc-for list="{{ menuItems }}" as="item" hint-placeholder-count="13">
          <button onClick="{{ goToModule }}" data-module="{{ item.id }}" style="background: {{ currentModule === item.id ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.1)' }}; border: none; color: #1a1a1a; padding: 12px 16px; border-radius: 8px; text-align: left; cursor: pointer; font-weight: 600; font-size: 14px; border-left: 3px solid {{ currentModule === item.id ? '#fff' : 'transparent' }}; transition: all 0.3s;">{{ item.icon }} {{ item.name }}</button>
        </sc-for>
      </div>
      <div style="background: rgba(255,255,255,0.1); padding: 12px; border-radius: 8px; font-size: 11px; color: #1a1a1a; margin-bottom: 12px;">
        {{ bdStatus }}
      </div>
      <button onClick="{{ handleLogout }}" style="width: 100%; background: rgba(255,255,255,0.2); color: #1a1a1a; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px;">🚪 Cerrar sesión</button>
    </nav>
    <main style="flex: 1; margin-left: 280px; padding: 32px; overflow-y: auto; background: linear-gradient(180deg, #f8f9fa 0%, #f0f0f0 100%);">
      {{ moduleContent }}
    </main>
  </div>
</sc-if>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    usuarioAutenticado: false,
    usuarioTipo: null,
    usuarioNombre: '',
    usuarioId: null,
    currentModule: 'dashboard',
    bdStatus: '📡 Esperando configuración...',
    supabase: null,
    bdConfigured: false,
    usuarios: [
      { id: 1, usuario: 'admin', password: '12345', nombre: 'Administrador', tipo: 'admin' },
      { id: 2, usuario: 'juan', password: '12345', nombre: 'Juan Terapista', tipo: 'terapista' },
    ],
    miembros: [
      { id: 1, nombre: 'Juan Pérez', email: 'juan@email.com', plan: 'Premium', telefono: '555-1234', estado: 'Activo', fechaInscripcion: '2024-01-15' },
      { id: 2, nombre: 'María García', email: 'maria@email.com', plan: 'Gold', telefono: '555-5678', estado: 'Activo', fechaInscripcion: '2024-02-20' },
      { id: 3, nombre: 'Carlos López', email: 'carlos@email.com', plan: 'Básico', telefono: '555-9012', estado: 'Inactivo', fechaInscripcion: '2023-11-10' },
    ],
    membresias: [
      { id: 1, nombre: 'Plan Básico', precio: 29.99, duracion: '1 mes', beneficios: 'Acceso a clases grupales', miembros: 45 },
      { id: 2, nombre: 'Plan Gold', precio: 59.99, duracion: '1 mes', beneficios: 'Clases + Entrenamiento personal', miembros: 28 },
      { id: 3, nombre: 'Plan Premium', precio: 99.99, duracion: '1 mes', beneficios: 'Acceso ilimitado + Nutrición', miembros: 15 },
    ],
    turnos: [
      { id: 1, fecha: '2024-12-15', hora: '10:00', miembro: 'Juan Pérez', actividad: 'Yoga', terapista: 'Juan', duracion: 60, estado: 'Confirmado' },
      { id: 2, fecha: '2024-12-15', hora: '11:30', miembro: 'María García', actividad: 'Pilates', terapista: 'Juan', duracion: 60, estado: 'Confirmado' },
      { id: 3, fecha: '2024-12-16', hora: '14:00', miembro: 'Carlos López', actividad: 'Yoga', terapista: 'Juan', duracion: 60, estado: 'Pendiente' },
    ],
    asistencias: [
      { id: 1, fecha: '2024-12-14', miembro: 'Juan Pérez', actividad: 'Yoga', entrada: '10:05', salida: '11:05', presente: true },
      { id: 2, fecha: '2024-12-14', miembro: 'María García', actividad: 'Pilates', entrada: '', salida: '', presente: false },
    ],
    cancelaciones: [
      { id: 1, fecha: '2024-12-13', miembro: 'Juan Pérez', turno: 'Yoga 10:00', razon: 'Motivo personal', horasAnticipacion: 3, permitida: true },
      { id: 2, fecha: '2024-12-12', miembro: 'Carlos López', turno: 'Yoga 14:00', razon: 'Falta de aviso', horasAnticipacion: 0.5, permitida: false },
    ],
    legajos: [
      { id: 1, miembro: 'Juan Pérez', dni: '12345678', fechaNacimiento: '1990-05-15', tipoSangre: 'O+', alergias: 'Penicilina', lesiones: 'Ninguna', observaciones: 'Excelente progreso' },
      { id: 2, miembro: 'María García', dni: '87654321', fechaNacimiento: '1985-03-22', tipoSangre: 'A-', alergias: 'Ninguna', lesiones: 'Lesión en rodilla', observaciones: 'En recuperación' },
    ],
    materiales: [
      { id: 1, nombre: 'Colchonetas Yoga', cantidad: 15, minimo: 5, precio: 45.00, estado: 'Normal' },
      { id: 2, nombre: 'Pesas Ajustables', cantidad: 8, minimo: 10, precio: 120.00, estado: 'Bajo' },
      { id: 3, nombre: 'Bandas Elásticas', cantidad: 2, minimo: 10, precio: 15.00, estado: 'Crítico' },
      { id: 4, nombre: 'Botellas de Agua', cantidad: 30, minimo: 10, precio: 25.00, estado: 'Normal' },
    ],
    pagos: [
      { id: 1, fecha: '2024-12-01', miembro: 'Juan Pérez', concepto: 'Membresía Premium', monto: 99.99, metodo: 'Tarjeta', estado: 'Pagado' },
      { id: 2, fecha: '2024-12-05', miembro: 'María García', concepto: 'Membresía Gold', monto: 59.99, metodo: 'Transferencia', estado: 'Pagado' },
      { id: 3, fecha: '2024-12-10', miembro: 'Carlos López', concepto: 'Membresía Básica', monto: 29.99, metodo: 'Efectivo', estado: 'Pendiente' },
    ],
    reuniones: [
      { id: 1, fecha: '2024-12-15', hora: '09:00', asunto: 'Planificación trimestral', asistentes: ['Admin', 'Juan'], ubicacion: 'Sala 1', estado: 'Programada' },
      { id: 2, fecha: '2024-12-20', hora: '15:00', asunto: 'Evaluación de desempeño', asistentes: ['Admin'], ubicacion: 'Sala 2', estado: 'Pendiente' },
    ],
  };

  componentDidMount() {
    this.initSupabase();
    const stored = localStorage.getItem('clubJuntosData');
    if (stored) {
      try {
        const data = JSON.parse(stored);
        this.setState(data);
      } catch (e) {}
    }
  }

  initSupabase() {
    const supabaseUrl = localStorage.getItem('supabaseUrl') || 'NO_CONFIGURADO';
    const supabaseKey = localStorage.getItem('supabaseKey') || 'NO_CONFIGURADO';
    
    if (supabaseUrl === 'NO_CONFIGURADO' || supabaseKey === 'NO_CONFIGURADO') {
      this.setState({ 
        bdStatus: '⚠️ No configurada. Ve a SETUP_BASE_DATOS_NUBE.md',
        bdConfigured: false 
      });
      return;
    }

    try {
      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
      this.setState({ 
        supabase: supabase, 
        bdConfigured: true,
        bdStatus: '✅ BD conectada a la nube'
      });
      console.log('✅ Supabase conectado');
    } catch (error) {
      this.setState({ 
        bdStatus: '❌ Error conectando BD',
        bdConfigured: false 
      });
    }
  }

  saveToStorage() {
    const dataToSave = {
      miembros: this.state.miembros,
      turnos: this.state.turnos,
      asistencias: this.state.asistencias,
      cancelaciones: this.state.cancelaciones,
      legajos: this.state.legajos,
      materiales: this.state.materiales,
      pagos: this.state.pagos,
      reuniones: this.state.reuniones,
    };
    localStorage.setItem('clubJuntosData', JSON.stringify(dataToSave));
  }

  handleLogin() {
    const usuario = document.getElementById('loginUser').value;
    const password = document.getElementById('loginPass').value;
    const u = this.state.usuarios.find(x => x.usuario === usuario && x.password === password);
    if (u) {
      this.setState({ usuarioAutenticado: true, usuarioTipo: u.tipo, usuarioNombre: u.nombre, usuarioId: u.id });
    } else {
      alert('Credenciales inválidas');
    }
  }

  handleLogout() {
    this.setState({ usuarioAutenticado: false, usuarioTipo: null, usuarioNombre: '', usuarioId: null });
  }

  goToModule(e) {
    this.setState({ currentModule: e.currentTarget.dataset.module });
  }

  addMiembro(nombre, email, plan, telefono) {
    const newMiembro = {
      id: Math.max(...this.state.miembros.map(m => m.id), 0) + 1,
      nombre, email, plan, telefono,
      estado: 'Activo',
      fechaInscripcion: new Date().toISOString().split('T')[0],
    };
    this.setState(s => ({ miembros: [...s.miembros, newMiembro] }), () => this.saveToStorage());
  }

  deleteMiembro(id) {
    this.setState(s => ({ miembros: s.miembros.filter(m => m.id !== id) }), () => this.saveToStorage());
  }

  addTurno(fecha, hora, miembro, actividad, duracion) {
    const newTurno = {
      id: Math.max(...this.state.turnos.map(t => t.id), 0) + 1,
      fecha, hora, miembro, actividad, duracion,
      terapista: this.state.usuarioNombre,
      estado: 'Confirmado',
    };
    this.setState(s => ({ turnos: [...s.turnos, newTurno] }), () => this.saveToStorage());
  }

  deleteTurno(id) {
    this.setState(s => ({ turnos: s.turnos.filter(t => t.id !== id) }), () => this.saveToStorage());
  }

  addAsistencia(fecha, miembro, actividad, entrada) {
    const newAsistencia = {
      id: Math.max(...this.state.asistencias.map(a => a.id), 0) + 1,
      fecha, miembro, actividad, entrada, salida: '', presente: true,
    };
    this.setState(s => ({ asistencias: [...s.asistencias, newAsistencia] }), () => this.saveToStorage());
  }

  addPago(fecha, miembro, concepto, monto, metodo) {
    const newPago = {
      id: Math.max(...this.state.pagos.map(p => p.id), 0) + 1,
      fecha, miembro, concepto, monto, metodo,
      estado: 'Pagado',
    };
    this.setState(s => ({ pagos: [...s.pagos, newPago] }), () => this.saveToStorage());
  }

  deletePago(id) {
    this.setState(s => ({ pagos: s.pagos.filter(p => p.id !== id) }), () => this.saveToStorage());
  }

  updateMaterial(id, nuevaCantidad) {
    this.setState(s => ({
      materiales: s.materiales.map(m => {
        if (m.id === id) {
          const estado = nuevaCantidad === 0 ? 'Crítico' : nuevaCantidad < m.minimo ? 'Bajo' : 'Normal';
          return { ...m, cantidad: nuevaCantidad, estado };
        }
        return m;
      })
    }), () => this.saveToStorage());
  }

  renderDashboard() {
    const totalIngresos = this.state.pagos.filter(p => p.estado === 'Pagado').reduce((a, p) => a + p.monto, 0);
    const miembrosActivos = this.state.miembros.filter(m => m.estado === 'Activo').length;
    const turnosHoy = this.state.turnos.filter(t => t.fecha === new Date().toISOString().split('T')[0]).length;

    return React.createElement('div', null,
      React.createElement('h1', { style: { fontSize: '28px', fontWeight: '700', marginBottom: '24px' } }, '📊 Dashboard'),
      React.createElement('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '16px', marginBottom: '32px' } },
        React.createElement('div', { style: { background: 'white', padding: '20px', borderRadius: '12px', boxShadow: '0 2px 8px rgba(0,0,0,0.1)' } },
          React.createElement('div', { style: { fontSize: '12px', color: '#999', marginBottom: '8px' } }, '👥 MIEMBROS ACTIVOS'),
          React.createElement('div', { style: { fontSize: '32px', fontWeight: '700', color: '#ec4899' } }, miembrosActivos)
        ),
        React.createElement('div', { style: { background: 'white', padding: '20px', borderRadius: '12px', boxShadow: '0 2px 8px rgba(0,0,0,0.1)' } },
          React.createElement('div', { style: { fontSize: '12px', color: '#999', marginBottom: '8px' } }, '📅 TURNOS HOY'),
          React.createElement('div', { style: { fontSize: '32px', fontWeight: '700', color: '#06b6d4' } }, turnosHoy)
        ),
        React.createElement('div', { style: { background: 'white', padding: '20px', borderRadius: '12px', boxShadow: '0 2px 8px rgba(0,0,0,0.1)' } },
          React.createElement('div', { style: { fontSize: '12px', color: '#999', marginBottom: '8px' } }, '💰 INGRESOS PAGADOS'),
          React.createElement('div', { style: { fontSize: '32px', fontWeight: '700', color: '#fbbf24' } }, '$' + totalIngresos.toFixed(2))
        ),
        React.createElement('div', { style: { background: 'white', padding: '20px', borderRadius: '12px', boxShadow: '0 2px 8px rgba(0,0,0,0.1)' } },
          React.createElement('div', { style: { fontSize: '12px', color: '#999', marginBottom: '8px' } }, '📦 STOCK CRÍTICO'),
          React.createElement('div', { style: { fontSize: '32px', fontWeight: '700', color: '#ef4444' } }, this.state.materiales.filter(m => m.estado === 'Crítico').length)
        )
      ),
      React.createElement('div', { style: { background: '#fffbeb', padding: '16px', borderRadius: '8px', marginTop: '24px', borderLeft: '4px solid #f59e0b' } },
        React.createElement('div', { style: { fontSize: '12px', fontWeight: '600', color: '#92400e', marginBottom: '4px' } }, '💡 Configuración Supabase'),
        React.createElement('div', { style: { fontSize: '12px', color: '#78350f' } }, this.state.bdStatus),
        React.createElement('div', { style: { fontSize: '11px', color: '#92400e', marginTop: '8px' } }, this.state.bdConfigured ? '✅ Datos se guardan permanentemente en la nube' : '⚠️ Los datos solo se guardan en el navegador. Ve a SETUP_BASE_DATOS_NUBE.md')
      )
    );
  }

  renderMiembros() {
    return React.createElement('div', null,
      React.createElement('h2', { style: { fontSize: '24px', fontWeight: '700', marginBottom: '24px' } }, '👥 Gestión de Miembros'),
      React.createElement('div', { style: { background: 'white', padding: '20px', borderRadius: '12px', marginBottom: '24px', boxShadow: '0 2px 8px rgba(0,0,0,0.1)' } },
        React.createElement('button', { onClick: () => {
          const nombre = prompt('Nombre:');
          const email = prompt('Email:');
          const plan = prompt('Plan (Básico/Gold/Premium):');
          const telefono = prompt('Teléfono:');
          if (nombre && email && plan && telefono) this.addMiembro(nombre, email, plan, telefono);
        }, style: { background: '#ec4899', color: 'white', border: 'none', padding: '10px 20px', borderRadius: '6px', cursor: 'pointer', fontWeight: '600' } }, '+ Agregar Miembro')
      ),
      React.createElement('table', { style: { width: '100%', borderCollapse: 'collapse', background: 'white', borderRadius: '12px', overflow: 'hidden', boxShadow: '0 2px 8px rgba(0,0,0,0.1)' } },
        React.createElement('thead', null,
          React.createElement('tr', { style: { background: '#f3f4f6', borderBottom: '2px solid #e5e7eb' } },
            React.createElement('th', { style: { padding: '16px', textAlign: 'left', fontWeight: '600' } }, 'Nombre'),
            React.createElement('th', { style: { padding: '16px', textAlign: 'left', fontWeight: '600' } }, 'Email'),
            React.createElement('th', { style: { padding: '16px', textAlign: 'left', fontWeight: '600' } }, 'Plan'),
            React.createElement('th', { style: { padding: '16px', textAlign: 'left', fontWeight: '600' } }, 'Estado'),
            React.createElement('th', { style: { padding: '16px', textAlign: 'left', fontWeight: '600' } }, 'Acciones')
          )
        ),
        React.createElement('tbody', null,
          this.state.miembros.map(m => React.createElement('tr', { key: m.id, style: { borderBottom: '1px solid #e5e7eb' } },
            React.createElement('td', { style: { padding: '16px' } }, m.nombre),
            React.createElement('td', { style: { padding: '16px' } }, m.email),
            React.createElement('td', { style: { padding: '16px' } }, React.createElement('span', { style: { background: '#ec4899', color: 'white', padding: '4px 12px', borderRadius: '12px', fontSize: '12px', fontWeight: '600' } }, m.plan)),
            React.createElement('td', { style: { padding: '16px' } }, React.createElement('span', { style: { background: m.estado === 'Activo' ? '#10b981' : '#999', color: 'white', padding: '4px 12px', borderRadius: '12px', fontSize: '12px', fontWeight: '600' } }, m.estado)),
            React.createElement('td', { style: { padding: '16px', display: 'flex', gap: '8px' } },
              React.createElement('button', { style: { background: '#06b6d4', color: 'white', border: 'none', padding: '6px 12px', borderRadius: '6px', cursor: 'pointer', fontSize: '12px', fontWeight: '600' } }, 'Ver'),
              React.createElement('button', { onClick: () => this.deleteMiembro(m.id), style: { background: '#ef4444', color: 'white', border: 'none', padding: '6px 12px', borderRadius: '6px', cursor: 'pointer', fontSize: '12px', fontWeight: '600' } }, 'Eliminar')
            )
          ))
        )
      )
    );
  }

  renderMembresias() {
    return React.createElement('div', null,
      React.createElement('h2', { style: { fontSize: '24px', fontWeight: '700', marginBottom: '24px' } }, '🎫 Planes de Membresía'),
      React.createElement('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: '24px' } },
        this.state.membresias.map(m => React.createElement('div', { key: m.id, style: { background: 'white', padding: '24px', borderRadius: '12px', boxShadow: '0 2px 8px rgba(0,0,0,0.1)' } },
          React.createElement('h3', { style: { fontSize: '18px', fontWeight: '700', marginBottom: '8px' } }, m.nombre),
          React.createElement('div', { style: { fontSize: '28px', fontWeight: '700', color: '#ec4899', marginBottom: '8px' } }, '$' + m.precio),
          React.createElement('p', { style: { color: '#666', fontSize: '14px', marginBottom: '12px' } }, m.beneficios),
          React.createElement('div', { style: { fontSize: '12px', color: '#999', marginBottom: '12px' } }, '👥 ' + m.miembros + ' miembros activos'),
          React.createElement('button', { style: { width: '100%', background: '#06b6d4', color: 'white', border: 'none', padding: '10px', borderRadius: '8px', cursor: 'pointer', fontWeight: '600' } }, 'Editar Plan')
        ))
      )
    );
  }

  renderTurnos() {
    return React.createElement('div', null,
      React.createElement('h2', { style: { fontSize: '24px', fontWeight: '700', marginBottom: '24px' } }, '📅 Gestión de Turnos'),
      React.createElement('div', { style: { background: 'white', padding: '20px', borderRadius: '12px', marginBottom: '24px', boxShadow: '0 2px 8px rgba(0,0,0,0.1)' } },
        React.createElement('button', { onClick: () => {
          const fecha = prompt('Fecha (YYYY-MM-DD):');
          const hora = prompt('Hora (HH:MM):');
          const miembro = prompt('Miembro:');
          const actividad = prompt('Actividad:');
          const duracion = parseInt(prompt('Duración (minutos):'));
          if (fecha && hora && miembro && actividad && duracion) this.addTurno(fecha, hora, miembro, actividad, duracion);

        React.createElement('h3', { style: { fontSize: '16px', fontWeight: '600', marginBottom: '16px' } }, '🏢 Datos del Club'),
        React.createElement('div', { style: { marginBottom: '16px' } },
          React.createElement('label', { style: { display: 'block', fontSize: '14px', fontWeight: '600', marginBottom: '8px' } }, '🏢 Nombre del Club'),
          React.createElement('input', { type: 'text', defaultValue: 'Club Juntos', style: { width: '100%', padding: '10px', borderRadius: '6px', border: '1px solid #e5e7eb' } })
        ),
        React.createElement('div', { style: { marginBottom: '16px' } },
          React.createElement('label', { style: { display: 'block', fontSize: '14px', fontWeight: '600', marginBottom: '8px' } }, '📧 Email de Contacto'),
          React.createElement('input', { type: 'email', defaultValue: 'info@clubjuntos.com', style: { width: '100%', padding: '10px', borderRadius: '6px', border: '1px solid #e5e7eb' } })
        ),
        React.createElement('div', { style: { marginBottom: '16px' } },
          React.createElement('label', { style: { display: 'block', fontSize: '14px', fontWeight: '600', marginBottom: '8px' } }, '📱 Teléfono'),
          React.createElement('input', { type: 'tel', defaultValue: '123-456-7890', style: { width: '100%', padding: '10px', borderRadius: '6px', border: '1px solid #e5e7eb' } })
        ),
        React.createElement('button', { style: { background: '#06b6d4', color: 'white', border: 'none', padding: '10px 24px', borderRadius: '6px', cursor: 'pointer', fontWeight: '600', marginTop: '16px' } }, 'Guardar Cambios')
      )
    );
  }

  renderModule() {
    switch(this.state.currentModule) {
      case 'dashboard': return this.renderDashboard();
      case 'miembros': return this.renderMiembros();
      case 'membresias': return this.renderMembresias();
      case 'turnos': return this.renderTurnos();
      case 'asistencia': return this.renderAsistencia();
      case 'cancelaciones': return this.renderCancelaciones();
      case 'legajos': return this.renderLegajos();
      case 'materiales': return this.renderMateriales();
      case 'pagos': return this.renderPagos();
      case 'reuniones': return this.renderReuniones();
      case 'reportes': return this.renderReportes();
      case 'busqueda': return this.renderBusqueda();
      case 'configuracion': return this.renderConfiguracion();
      default: return this.renderDashboard();
    }
  }

  renderVals() {
    const menuItems = [
      { id: 'dashboard', name: 'Dashboard', icon: '📊' },
      { id: 'miembros', name: 'Miembros', icon: '👥' },
      { id: 'membresias', name: 'Membresías', icon: '🎫' },
      { id: 'turnos', name: 'Turnos', icon: '📅' },
      { id: 'asistencia', name: 'Asistencia', icon: '✅' },
      { id: 'cancelaciones', name: 'Cancelaciones', icon: '❌' },
      { id: 'legajos', name: 'Legajos', icon: '📋' },
      { id: 'materiales', name: 'Materiales', icon: '📦' },
      { id: 'pagos', name: 'Pagos', icon: '💳' },
      { id: 'reuniones', name: 'Reuniones', icon: '🤝' },
      { id: 'reportes', name: 'Reportes', icon: '📈' },
      { id: 'busqueda', name: 'Búsqueda', icon: '🔍' },
      { id: 'configuracion', name: 'Configuración', icon: '⚙️' },
    ];

    return {
      usuarioAutenticado: this.state.usuarioAutenticado,
      usuarioNombre: this.state.usuarioNombre,
      bdStatus: this.state.bdStatus,
      menuItems: menuItems,
      currentModule: this.state.currentModule,
      moduleContent: this.renderModule(),
      handleLogin: (e) => this.handleLogin(),
      handleLogout: () => this.handleLogout(),
      goToModule: (e) => this.goToModule(e),
    };
  }
}
</script>
